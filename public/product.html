<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün - Vetaris</title>
    <meta name="description" content="Vetaris ürün detay sayfası.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        .product-detail-section {
            padding: 4rem 0 6rem;
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .product-detail-image-wrap {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 380px;
        }

        .product-detail-image-wrap img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 8px;
        }

        .product-detail-info {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .product-detail-info .product-category {
            font-size: 0.85rem;
        }

        .product-detail-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .product-detail-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .product-detail-desc {
            font-size: 1rem;
            color: var(--text-light);
            line-height: 1.8;
            border-top: 1px solid #eee;
            padding-top: 1.2rem;
        }

        .product-detail-stock {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        .stock-available {
            background-color: #d4edda;
            color: #155724;
        }

        .stock-unavailable {
            background-color: #f8d7da;
            color: #721c24;
        }

        .product-detail-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding-top: 0.5rem;
        }

        .product-detail-actions .btn-primary,
        .product-detail-actions .btn-secondary {
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

        .product-detail-actions .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-detail-info h1 {
                font-size: 1.7rem;
            }

            .product-detail-price {
                font-size: 1.6rem;
            }

            .product-detail-actions .btn-primary,
            .product-detail-actions .btn-secondary {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <img src="/images/logo.jpg" alt="Vetaris Logo" style="height: 40px; vertical-align: middle;">
            </a>
            <div class="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="index.html#products">Ürünler</a>
                <a href="blog.html">Blog</a>
                <a href="about.html">Hakkımızda</a>
                <a href="contact.html">İletişim</a>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag fa-lg"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container product-detail-section">

        <a href="index.html#products" class="back-link">
            <i class="fas fa-arrow-left"></i> Ürünlere Dön
        </a>

        <!-- Loading State -->
        <div id="product-loading">
            <div class="product-detail-grid">
                <div class="skeleton" style="height: 420px;"></div>
                <div style="display:flex; flex-direction:column; gap:1.2rem;">
                    <div class="skeleton" style="height: 20px; width: 80px;"></div>
                    <div class="skeleton" style="height: 48px; width: 70%;"></div>
                    <div class="skeleton" style="height: 40px; width: 120px;"></div>
                    <div class="skeleton" style="height: 100px;"></div>
                    <div class="skeleton" style="height: 52px;"></div>
                </div>
            </div>
        </div>

        <!-- Product Detail (hidden until loaded) -->
        <div id="product-detail" style="display:none;">
            <div class="product-detail-grid">

                <!-- Image -->
                <div class="product-detail-image-wrap">
                    <img id="product-image" src="" alt="">
                </div>

                <!-- Info -->
                <div class="product-detail-info">
                    <span id="product-category" class="product-category"></span>
                    <h1 id="product-name"></h1>
                    <div class="product-detail-price" id="product-price"></div>
                    <span id="product-stock" class="product-detail-stock"></span>
                    <p id="product-description" class="product-detail-desc"></p>
                    <div class="product-detail-actions">
                        <button id="product-add-btn" class="btn-primary">
                            <i class="fas fa-shopping-bag" style="margin-right:0.5rem;"></i>Sepete Ekle
                        </button>
                        <a href="checkout.html" class="btn-secondary">
                            <i class="fas fa-bolt" style="margin-right:0.5rem;"></i>Hemen Al
                        </a>
                    </div>
                </div>

            </div>
        </div>

        <!-- Error State -->
        <div id="product-error" style="display:none; text-align:center; padding: 4rem 0;">
            <i class="fas fa-exclamation-circle" style="font-size:3rem; color:#ccc; margin-bottom:1rem; display:block;"></i>
            <h2 style="color:var(--text-light); margin-bottom:1rem;">Ürün bulunamadı</h2>
            <a href="index.html#products" class="btn-primary">Ürünlere Dön</a>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Vetaris - Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    <!-- Cart Modal -->
    <div id="cart-modal" class="cart-modal">
        <div class="cart-header">
            <h3>Sepetim</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items">
            <p class="empty-cart-msg">Sepetiniz boş.</p>
        </div>
        <div class="cart-footer">
            <div class="total-price">Toplam: 0.00 ₺</div>
            <button class="btn-checkout" onclick="checkout()">Siparişi Tamamla</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            if (!productId) {
                showError();
                return;
            }

            try {
                const res = await fetch(`/api/products/${productId}`);

                if (!res.ok) {
                    showError();
                    return;
                }

                const product = await res.json();

                // Expose to allProducts so addToCart() in app.js can find it
                allProducts = [product];

                // Update page title & meta
                document.title = `${product.name} - Vetaris`;

                // Populate fields
                document.getElementById('product-image').src = product.image;
                document.getElementById('product-image').alt = product.name;
                document.getElementById('product-name').innerText = product.name;
                document.getElementById('product-category').innerText = product.category;
                document.getElementById('product-price').innerText = product.price.toFixed(2) + ' ₺';
                document.getElementById('product-description').innerText = product.description;

                // Stock badge
                const stockEl = document.getElementById('product-stock');
                const addBtn = document.getElementById('product-add-btn');
                if (product.stock > 0) {
                    stockEl.className = 'product-detail-stock stock-available';
                    stockEl.innerHTML = '<i class="fas fa-check-circle"></i> Stokta Var';
                    addBtn.onclick = () => addToCart(product.id);
                } else {
                    stockEl.className = 'product-detail-stock stock-unavailable';
                    stockEl.innerHTML = '<i class="fas fa-times-circle"></i> Stok Tükendi';
                    addBtn.disabled = true;
                    addBtn.innerText = 'Stok Tükendi';
                }

                // Show detail, hide loader
                document.getElementById('product-loading').style.display = 'none';
                document.getElementById('product-detail').style.display = 'block';

            } catch (e) {
                console.error(e);
                showError();
            }
        });

        function showError() {
            document.getElementById('product-loading').style.display = 'none';
            document.getElementById('product-error').style.display = 'block';
        }
    </script>

</body>

</html>
